name: Deploy Sphinx documentation to Github Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install required packages
        run: |
          python3 -m pip uninstall -y clang libclang || true
          python3 -m pip install --force-reinstall -r docs/requirements.txt

      - name: Build docs
        run: sphinx-build docs /tmp

  pages:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install required packages
      run: |
        pip3 install -r docs/requirements.txt
        # the sphinx-c-autodoc library keeps throwing an error on
        # first run. if you reinstall libclang, this problem disappears.
        # that's why we have to build once
        sphinx-build docs /tmp || true
        pip3 install --force $(cat docs/requirements.txt | grep ^libclang)

    - id: deployment
      uses: sphinx-notes/pages@v3
      if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
      with:
        publish: false

    - name: Deploy to pages
      uses: peaceiris/actions-gh-pages@v3
      if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ${{ steps.deployment.outputs.artifact }}
